name: Upload Release Asset
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true
        default: 'v2.0.2'
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build JAR
        run: ./gradlew shadowJar copyJar
      - name: Upload to Release
        run: |
          gh release upload ${{ inputs.tag }} burpmcp-ultra.jar --clobber
        env:
          GH_TOKEN: ${{ github.token }}
